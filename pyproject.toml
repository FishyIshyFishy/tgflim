[
build-system
]
requires = [
    "setuptools>=61.0"
]
build-backend = "setuptools.build_meta"

[
project
]
name = "tgflim"
version = "0.0.0"
description = "tgflim: simulation for time-gated FLIM"
readme = "README.md"
requires-python = ">=3.9"
license = { file = "LICENSE" }
authors = [
    { name = "Ishaan Singh" }
]
keywords = [
    "flim",
    "tgflim"
]
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent"
]

[
tool.setuptools.packages.find
]
include = [
    "tgflim*"
]

